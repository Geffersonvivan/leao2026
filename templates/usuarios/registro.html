{% extends "base.html" %}
{% block title %}Criar conta — Calculadora IR{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Criar conta</h2>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
          <input type="text" name="first_name" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"
            placeholder="João">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Sobrenome</label>
          <input type="text" name="last_name" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"
            placeholder="Silva">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
        <input type="email" name="email" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"
          placeholder="seu@email.com">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">CPF</label>
        <input type="text" name="cpf" maxlength="14"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"
          placeholder="000.000.000-00">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input type="password" name="password1" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"
          placeholder="mínimo 8 caracteres">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar senha</label>
        <input type="password" name="password2" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand"
          placeholder="repita a senha">
      </div>

      {% if erro %}
        <p class="text-red-600 text-sm">{{ erro }}</p>
      {% endif %}

      <button type="submit"
        class="w-full bg-brand text-white py-2.5 rounded-lg font-semibold text-sm hover:bg-blue-700 transition">
        Criar conta
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-5">
      Já tem conta?
      <a href="{% url 'login' %}" class="text-brand hover:underline font-medium">Entrar</a>
    </p>
  </div>
</div>
{% endblock %}
