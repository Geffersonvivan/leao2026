<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Calculadora IR{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token }}">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  {% include "partials/navbar.html" %}

  <main class="flex-1 container mx-auto px-4 py-8 max-w-5xl">
    {% if messages %}
      {% for msg in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium
          {% if msg.tags == 'error' %}bg-red-100 text-red-700
          {% elif msg.tags == 'success' %}bg-green-100 text-green-700
          {% else %}bg-blue-100 text-blue-700{% endif %}">
          {{ msg }}
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <footer class="bg-white border-t border-gray-200 py-4 text-center text-xs text-gray-400">
    Leão 2026 &copy; {{ "now"|date:"Y" }} — Siga sempre as regras da Receita Federal
  </footer>

</body>
</html>
