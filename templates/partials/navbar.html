{% load static %}
<nav class="bg-white border-b border-gray-200 shadow-sm">
  <div class="container mx-auto px-4 max-w-5xl flex items-center justify-between h-14">

    <a href="{% url 'home' %}" class="flex items-center gap-2 font-bold text-brand text-lg whitespace-nowrap">
      <img src="{% static 'img/leao2026.png' %}" alt="" class="h-9 w-auto max-w-[36px] object-cover object-left">
      Leão 2026
    </a>

    <div class="flex items-center gap-4 text-sm">
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="text-gray-600 hover:text-brand font-medium">Dashboard</a>
        <a href="{% url 'planos' %}" class="text-gray-600 hover:text-brand font-medium">Planos</a>
        <span class="text-gray-400">|</span>
        <span class="text-gray-500">{{ user.get_full_name|default:user.username }}</span>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="text-gray-500 hover:text-red-600">Sair</button>
        </form>
      {% else %}
        <a href="{% url 'planos' %}" class="text-gray-600 hover:text-brand">Planos</a>
        <a href="{% url 'login' %}" class="text-gray-600 hover:text-brand">Entrar</a>
        <a href="{% url 'registro' %}"
           class="bg-brand text-white px-4 py-1.5 rounded-lg hover:bg-brand-dark transition">
          Criar conta
        </a>
      {% endif %}
    </div>

  </div>
</nav>
